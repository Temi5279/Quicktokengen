<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Password Generator | Free Online Security Tool</title>
    
    <style>
        /* Modern Dark Theme Styling */
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #38bdf8;
        }

        /* Temporary styling for our placeholders */
        .box {
            background-color: #0f172a;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 1.2rem;
            color: #94a3b8;
            border: 1px dashed #38bdf8;
        }

        button {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background-color: #7dd3fc;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Secure Password Generator</h1>
        
        <!-- This is where the password will show up -->
        <div class="box" id="output-box">
            Your secure password will appear here...
        </div>

        <!-- The button to trigger it -->
        <button>Generate Password</button>
    </div>

</body>
  </html>
