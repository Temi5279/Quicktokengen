<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Password Generator | Free Online Security Tool</title>
    
    <style>
        /* Modern Dark Theme Styling */
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #38bdf8;
        }

        /* Temporary styling for our placeholders */
        .box {
            background-color: #0f172a;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 1.2rem;
            color: #94a3b8;
            border: 1px dashed #38bdf8;
        }

        button {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background-color: #7dd3fc;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Secure Password Generator</h1>
        
        <!-- This is where the password will show up -->
        <div class="box" id="output-box">
            Your secure password will appear here...
        </div>

        <!-- The button to trigger it -->
        <button>Generate Password</button>
    </div>

    <script>
        // 1. Grab the elements from our HTML page
        const outputBox = document.getElementById('output-box');
        const generateBtn = document.querySelector('button');

        // 2. Create the function that generates a strong password
        function generatePassword() {
            // The exact characters our pool will pick from
            const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+~`|}{[]:;?><,./-=';
            let newPassword = '';
            const passwordLength = 16; // Standard secure length

            // Loop 16 times to pick 16 random characters
            for (let i = 0; i < passwordLength; i++) {
                const randomIndex = Math.floor(Math.random() * characters.length);
                newPassword += characters.charAt(randomIndex);
            }

            // 3. Put the newly made password inside our display box
            outputBox.innerText = newPassword;
            
            // Change text color to bright blue so the user knows it changed!
            outputBox.style.color = '#38bdf8'; 
            outputBox.style.borderStyle = 'solid';
        }

        // 4. Tell the button to run this function every time it gets clicked
        generateBtn.addEventListener('click', generatePassword);
    </script>
    
</body>
  </html>
